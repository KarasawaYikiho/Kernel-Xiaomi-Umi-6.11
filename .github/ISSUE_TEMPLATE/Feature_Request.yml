name: Feature request
description: Propose a workflow/script/documentation improvement
labels: [enhancement]
body:
  - type: input
    id: area
    attributes:
      label: Area
      placeholder: "phase2 workflow / dtb tooling / docs"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are we solving?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: reliability / observability / speed / readability

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: This does not duplicate an existing proposal
          required: true
