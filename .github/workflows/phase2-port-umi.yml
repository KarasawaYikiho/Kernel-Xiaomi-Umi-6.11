name: Phase2 Port UMI (SO-TS -> 5+)

concurrency:
  group: phase2-umi-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "4.19 source repo"
        required: true
        default: "https://github.com/SO-TS/android_kernel_xiaomi_sm8250.git"
      source_branch:
        description: "4.19 source branch"
        required: true
        default: "android16-aptusitu"
      target_repo:
        description: "5+ target repo"
        required: true
        default: "https://github.com/yefxx/xiaomi-umi-linux-kernel.git"
      target_branch:
        description: "5+ target branch"
        required: true
        default: "master"
      device:
        description: "device codename"
        required: true
        default: "umi"

jobs:
  port-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout orchestrator repo
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex libssl-dev make libc6-dev libncurses5-dev \
            crossbuild-essential-arm64 ccache pahole lz4 xz-utils zstd python3 clang lld llvm zip

      - name: Clone source and target
        run: |
          git clone --depth=1 --branch "${{ github.event.inputs.source_branch }}" "${{ github.event.inputs.source_repo }}" source
          git clone --depth=1 --branch "${{ github.event.inputs.target_branch }}" "${{ github.event.inputs.target_repo }}" target

      - name: Check target kernel major
        run: |
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL)\s*=\s*' target/Makefile

      - name: Apply Phase2 migration
        run: |
          chmod +x tools/porting/phase2_apply.sh
          ./tools/porting/phase2_apply.sh "$PWD/source" "$PWD/target" "${{ github.event.inputs.device }}"

      - name: Build target kernel (attempt)
        env:
          ARCH: arm64
        run: |
          mkdir -p out artifacts
          set +e
          make -C target O=$PWD/out LLVM=1 LLVM_IAS=1 "${{ github.event.inputs.device }}_defconfig" > artifacts/make-defconfig.log 2>&1
          rc1=$?
          make -C target O=$PWD/out LLVM=1 LLVM_IAS=1 -j"$(nproc)" Image.gz dtbs modules > artifacts/make-build.log 2>&1
          rc2=$?
          set -e

          {
            echo "defconfig_rc=$rc1"
            echo "build_rc=$rc2"
          } > artifacts/build-exit.txt

          # fail step when build stage failed, while keeping logs for later artifact upload
          if [ "$rc1" -ne 0 ] || [ "$rc2" -ne 0 ]; then
            exit 1
          fi

      - name: Collect artifacts + umi-focused package
        if: always()
        run: |
          chmod +x tools/porting/collect_phase2_artifacts.sh
          ./tools/porting/collect_phase2_artifacts.sh "${{ github.event.inputs.device }}"

      - name: Build AnyKernel candidate zip
        if: always()
        run: |
          chmod +x tools/porting/build_anykernel_candidate.sh
          ./tools/porting/build_anykernel_candidate.sh

      - name: Generate consolidated phase2 report
        if: always()
        run: |
          python3 tools/porting/build_phase2_report.py || true

      - name: Write run metadata
        if: always()
        run: |
          mkdir -p artifacts
          {
            echo "workflow=phase2-port-umi"
            echo "run_id=${{ github.run_id }}"
            echo "run_number=${{ github.run_number }}"
            echo "sha=${{ github.sha }}"
            echo "ref=${{ github.ref }}"
            echo "device=${{ github.event.inputs.device }}"
            echo "source_repo=${{ github.event.inputs.source_repo }}"
            echo "source_branch=${{ github.event.inputs.source_branch }}"
            echo "target_repo=${{ github.event.inputs.target_repo }}"
            echo "target_branch=${{ github.event.inputs.target_branch }}"
          } > artifacts/run-meta.txt

      - name: Run postprocess suite
        if: always()
        run: |
          chmod +x tools/porting/run_postprocess_suite.sh
          ./tools/porting/run_postprocess_suite.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-umi-${{ github.run_number }}
          path: artifacts/
